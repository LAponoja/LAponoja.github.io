<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วางซ้อนวัตถุ</title>
    <style>
        .container {
            position: relative;
            width: 300px;
            height: 300px;
            justify-self: center;
        }

        .black-box, .red-box, .blue-box {
            position: absolute;
            width: 150px;
            height: 200px;
            transition: transform 0.5s ease, z-index 0.5s;
        }

        .black-box {
            background-color: black;
            top: 50px;
            left: 150px;
            z-index: 1;
        }

        .red-box {
            background-color: red;
            width: 150px;
            height: 250px;
            top: 30px;
            left: 80px;
            z-index: 2;
            animation-name: blue-box;
        }

        .blue-box {
            background-color: blue;
            top: 50px;
            left: 0px;
            z-index: 1;
        }

         
        .red-box:hover {
            
            z-index: 4;  
         }

         
        .black-box:hover {
            transform: translateX(-70px) translateY(0px);
            z-index: 4; /* Brings to front */

        }

        /* Animation when hovering over blue box */
        .blue-box:hover {
            animation: blue-box 4s ease-in-out;
        }

        .blue-box:hover ~ .red-box {
            animation: move-red 1s ease-in-out forwards;
        }
        @keyframes blue-box  {
            0% {
                transform: translate(10px, 10px);
