<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/sty.css">
    <title>Document</title>
</head>
<body class="coler">
    <container>
        <div class="pin-container">
            <h2>วันครบรอบ เดือนนี้คือ</h2>
            <div class="pin-input">
                <input type="text" maxlength="1" id="pin1" oninput="moveToNext(this, 'pin2')">
                <input type="text" maxlength="1" id="pin2" oninput="moveToNext(this, 'pin3')">
                <input type="text" maxlength="1" id="pin3" oninput="moveToNext(this, 'pin4')">
                <input type="text" maxlength="1" id="pin4" oninput="moveToNext(this, 'pin5')">
                <input type="text" maxlength="1" id="pin5" oninput="moveToNext(this, 'pin6')">
                <input type="text" maxlength="1" id="pin6">
            </div>
            
        </div>
        <div class="">
                <button class="button" onclick="verifyPIN()">กด</button> <!-- เพิ่ม onclick event -->
                
            </div>
            <p id="error-message" class="error" style="display: none; color: red;">รหัสไม่ถูกต้อง</p>
    </container>
        
    <script>
        const correctPIN = "160268"; 
    
        function moveToNext(current, nextID) {
            if (current.value.length === 1) {
                document.getElementById(nextID)?.focus();
            }
        }
    
        function verifyPIN() {
            const pin = 
                document.getElementById("pin1").value +
                document.getElementById("pin2").value +
                document.getElementById("pin3").value +
                document.getElementById("pin4").value +
                document.getElementById("pin5").value +
                document.getElementById("pin6").value;
    
            // ตรวจสอบ PIN
            if (pin === correctPIN) {
                window.location.href = "main.html";
            } else {
                const errorMessage = document.getElementById("error-message");
                errorMessage.style.display = "block";
                errorMessage.textContent = "รหัสไม่ถูกต้อง";
            }
        }
    </script>
</body>
</html>
